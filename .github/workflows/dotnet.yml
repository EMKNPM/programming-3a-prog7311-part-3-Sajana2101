name: Run .NET Tests

on:
  push:
    branches: [ main, master, part-3-soa-docker ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sql-server-db:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong!Passw0rd2026"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd2026' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      API_BASE_URL: "http://localhost:7160/"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://localhost:7160"

      ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=GLMSDB_CI;User Id=sa;Password=YourStrong!Passw0rd2026;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"

      Jwt__Key: "GLMS2SuperSecretJwtKeyForPartThreeAuthentication2026"
      Jwt__Issuer: "GLMS2.API2"
      Jwt__Audience: "GLMS2.MVC"
      Jwt__ExpiresInMinutes: "120"

      DemoUser__Username: "admin"
      DemoUser__Password: "Admin@123"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Start GLMS API
        run: |
          dotnet run --project GLMS2.API2/GLMS2.API2.csproj --configuration Release --no-build > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health check
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7160/health; then
              echo "API is running"
              exit 0
            fi

            echo "Waiting for API..."
            sleep 5
          done

          echo "API failed to start. Printing API logs:"
          cat api.log
          exit 1

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Upload API logs if tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log
